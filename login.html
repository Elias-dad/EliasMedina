<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inmobiliaria PNK</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <style>
:root {
    --brand: #1e7f4c;
    --accent: #34a853;
    --surface: #f3fbf5;
    --text: #093318;
    --muted: #6b8f7a;
}

body {
    background: linear-gradient(180deg, #f3fbf5 0%, #f9fff9 100%);
    color: var(--text);
}

.btn-primary {
    background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%) !important;
    border: none !important;
}
.btn-primary:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 10px 20px rgba(30,127,76,0.25) !important;
}

.btn-ver-mas {
    background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%) !important;
    color: white !important;
    border: none !important;
}

.form-control:focus, .form-select:focus {
    border-color: var(--brand) !important;
    box-shadow: 0 0 0 3px rgba(30,127,76,0.08) !important;
}

.footer-bg {
    background: linear-gradient(135deg, #072613 0%, var(--brand) 100%) !important;
}
.footer-bg a { color: #ffffff !important; }

.page-header, .hero-banner {
    background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%) !important;
    color: white !important;
}

.fieldset-legend {
    background: #eaf7ed !important;
    color: var(--brand) !important;
}

.property-image {
    background: linear-gradient(135deg, #e6f4ea 0%, #c8ecd3 100%) !important;
}

.hero-card { background: rgba(255,255,255,0.06) !important; }

/* Small adjustments for contrast */
a, .nav-link { color: var(--brand) !important; }
    </style>
</head>

<body itemscope itemtype="https://schema.org/WebPage">
    <main id="main-content" tabindex="-1" role="main">
        <section class="login-container" aria-labelledby="titulo-login" role="region">
            <div class="login-card">
                <header class="login-header" role="banner">
                    <h1 id="titulo-login" class="mb-0 fs-2">Inmobiliaria PNK</h1>
                    <p class="mb-0 mt-2 opacity-75">Inicia sesión en tu cuenta</p>
                </header>
                <section class="login-body" aria-labelledby="form-login-titulo" role="region">
                    <form aria-labelledby="form-login-titulo" autocomplete="on" novalidate>
                        <h2 id="form-login-titulo" class="visually-hidden">Formulario de inicio de sesión</h2>
                        <fieldset>
                            <legend class="visually-hidden">Datos de acceso</legend>
                            <div class="mb-4">
                                <label for="usuario" class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ingresa tu usuario" autocomplete="username">
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa tu contraseña" autocomplete="current-password">
                            </div>
                        </fieldset>
                        <button type="submit" class="btn btn-primary" aria-label="Iniciar sesión">
                            <i class="bi bi-box-arrow-in-right me-2" aria-hidden="true"></i>Continuar
                        </button>
                    </form>
                    <div class="mt-4 p-3 rounded-3" style="background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.08);">
                        <p class="mb-1 fw-semibold">Credenciales de administrador</p>
                        <p class="mb-0 small text-muted">Usuario: <strong>Admin</strong> · Contraseña: <strong>Adminpass</strong></p>
                    </div>
                </section>
            </div>
        </section>
    </main>
    <script src="js/bootstrap.bundle.min.js"></script>
    <!-- Se eliminó la lógica de autenticación/almacenamiento local; redirige a index.html al enviar -->
    <script>
        (function() {
            var form = document.querySelector('form');
            if (!form) return;
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>

</html>
